# Placeholder release workflow. Customize package/build commands before enabling tags.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify changelog mentions tag
        run: |
          tag="${GITHUB_REF_NAME}"
          grep -F "$tag" CHANGELOG.md || echo "::warning::CHANGELOG.md does not mention $tag"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
