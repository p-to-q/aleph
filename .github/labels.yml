# Seed label set. Use with scripts/apply-labels.mjs or your own label sync action.
# Inspired by Wittgenstein's semantic label taxonomy: type/status/priority/size/slice/stage.
- name: type/bug
  color: d73a4a
  description: Broken expected behavior
- name: type/feature
  color: a2eeef
  description: New capability or user-facing improvement
- name: type/question
  color: d876e3
  description: Needs answer, not implementation yet
- name: type/discussion
  color: d876e3
  description: Open-ended design or community discussion
- name: type/governance
  color: 5319e7
  description: Workflow, policy, license, release, or decision-lane change
- name: type/tracker
  color: cfd3d7
  description: Tracking issue, not directly actionable
- name: type/horizon-spike
  color: fbca04
  description: Time-boxed exploration with kill criteria
- name: status/needs-triage
  color: cfd3d7
  description: Needs first maintainer pass
- name: status/ready
  color: 0e8a16
  description: Actionable now
- name: status/blocked
  color: b60205
  description: Blocked by named dependency
- name: status/needs-decision
  color: fbca04
  description: Requires maintainer decision or ADR/RFC
- name: status/in-progress
  color: 1d76db
  description: Work is active
- name: status/needs-review
  color: 0052cc
  description: Implementation exists and awaits review
- name: priority/p0
  color: b60205
  description: Must resolve before current release or mainline gate
- name: priority/p1
  color: d93f0b
  description: High priority after the current mainline gate
- name: priority/p2
  color: fbca04
  description: Important but not current-mainline blocking
- name: size/xs
  color: c2e0c6
  description: Tiny docs/config/test fix
- name: size/s
  color: c2e0c6
  description: Small scoped change
- name: size/m
  color: 7fdbff
  description: Medium multi-file change
- name: size/l
  color: fef2c0
  description: Large implementation or coordination
- name: size/xl
  color: e99695
  description: Umbrella or program-level work
- name: slice/docs
  color: 0075ca
  description: Documentation work
- name: slice/tests
  color: 0075ca
  description: Tests and fixtures
- name: slice/implementation
  color: 0075ca
  description: Code implementation with acceptance gate
- name: slice/infra
  color: 0075ca
  description: CI, automation, dependencies, tooling
- name: slice/release
  color: 0075ca
  description: Release, packaging, changelog, distribution
- name: slice/research
  color: 0075ca
  description: Research that must feed a durable downstream surface
- name: slice/receipts
  color: 0075ca
  description: Manifest, metadata, template checks, output proofs, or project-specific golden work
- name: stage/cross-cutting
  color: 6f42c1
  description: Cross-cutting schema, CLI, manifest, dependency, or infra work
- name: stage/governance
  color: 6f42c1
  description: Workflow, labels, doctrine governance, or maintainer process
- name: research-derived
  color: 5319e7
  description: Originates from a research brief; body cites the brief and section
- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation
- name: dependencies
  color: 0366d6
  description: Dependency updates
