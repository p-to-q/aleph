# Monthly link check. Keep it scheduled instead of blocking every PR unless docs are core product.
name: Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: "13 6 1 * *"

permissions:
  contents: read
  issues: write

jobs:
  local-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: node scripts/check-links.mjs
