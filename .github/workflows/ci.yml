# Lightweight CI. Adapt command blocks to the language/runtime of the project.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check required template files
        run: node scripts/doctor.mjs

      - name: Markdown link sanity
        run: |
          node scripts/check-links.mjs

  node-checks:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('package.json') != '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install when lockfile exists
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install --ignore-scripts; fi
      - name: Lint if configured
        run: npm run lint --if-present
      - name: Test if configured
        run: npm test --if-present
