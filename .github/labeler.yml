# PR path labeler. Tune these paths per project.
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

slice/infra:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "scripts/**"
          - "package.json"

slice/tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.*"
          - "test/**"
          - "tests/**"

type/governance:
  - changed-files:
      - any-glob-to-any-file:
          - "AGENTS.md"
          - "PROMPT.md"
          - "WORKFLOW.md"
          - "CONTRIBUTING.md"
          - "SECURITY.md"
          - "SUPPORT.md"
          - "docs/engineering-discipline.md"
          - "docs/labels.md"
          - "optional/decisions/**"
